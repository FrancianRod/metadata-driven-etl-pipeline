# =============================================================================
# REAL-WORLD SUCCESS EXAMPLE
# Pipeline: Operational Report Automation
# Sector : Tech / Data Science (Big Data & Efficiency)
# Impact : 4h manual work → 20 min automated  (90% reduction)
# =============================================================================
#
# CONTEXT — what this replaces
# ─────────────────────────────────────────────────────────────────────────────
# Before automation, the data team spent ~4 hours every morning doing this
# manually across multiple tools (SAS Viya exports, Python scripts, Excel):
#
#   1. Download raw event logs from 3 different regions (us-east-1, us-west-2,
#      sa-east-1) and merge them into a single file.            (~40 min)
#   2. Open each file, rename inconsistent column names by hand. (~20 min)
#   3. Cast data types — response_time_ms kept coming as string (~15 min)
#   4. Filter out events with error_flag = 1 for the clean report (~10 min)
#   5. Fill missing region tags that arrived blank               (~10 min)
#   6. Compute derived metrics: throughput, SLA breach flag      (~30 min)
#   7. Remove duplicate event IDs from overlapping log windows   (~20 min)
#   8. Manually copy results into the reporting database         (~40 min)
#   9. Write a Slack/email summary of the run stats              (~15 min)
#
# Total: ~3h 20min active work + ~40min waiting = ~4h per day
# With 22 working days/month → 88 hours/month burned on repetition.
#
# AFTER automation: pipeline runs on schedule in ~20 min, zero manual steps.
# Monthly savings: ~82 hours | Yearly: ~984 hours (~6 months of a work year).
#
# HOW TO RUN
# ─────────────────────────────────────────────────────────────────────────────
#   python run_pipeline.py examples/operational_reports/pipeline.yaml
#
# To schedule daily at 06:00 (Linux cron):
#   0 6 * * * /usr/bin/python /path/to/run_pipeline.py /path/to/pipeline.yaml
# =============================================================================

pipeline_name: operational_report_automation_v1

# ── 1. SOURCE ─────────────────────────────────────────────────────────────────
# Reads the raw event log exported from the distributed processing layer.
# In production this would be a DuckDB or REST API source pointing to the
# data lake layer (e.g. SAS Viya REST endpoint or S3-backed DuckDB file).
# For portfolio demonstration, we use the local CSV replica.
source:
  type: csv
  path: examples/operational_reports/raw_events.csv
  delimiter: ","
  encoding: utf-8

# ── 2. TRANSFORMATIONS ────────────────────────────────────────────────────────
# Each step below replaces one of the previously manual tasks.
# Order matters — transformations are applied sequentially.
transformations:

  # STEP 1 — Standardise column names
  # Before: team renamed columns manually in Excel every morning.
  # Columns from legacy SAS Viya export used camelCase inconsistently.
  - type: rename_columns
    mapping:
      event_id:           event_id
      status_code:        http_status
      response_time_ms:   latency_ms
      records_processed:  volume
      error_flag:         is_error
      operator_id:        operator

  # STEP 2 — Fix data types
  # Before: response_time_ms and records_processed arrived as strings from
  # the CSV export, causing sum/avg calculations to silently fail in Excel.
  - type: cast_types
    columns:
      http_status:  int
      latency_ms:   float
      volume:       int
      is_error:     int

  # STEP 3 — Fill missing region tags
  # Before: ~5% of events from sa-east-1 arrived with blank region field
  # after a pipeline outage. Team filled these manually cell by cell.
  - type: fill_nulls
    columns:
      region:   "unknown"
      operator: "unassigned"
      notes:    ""

  # STEP 4 — Normalise free-text fields
  # Before: region names came in mixed case ("US-EAST-1", "us-east-1", "Us-East-1")
  # breaking GROUP BY aggregations downstream.
  - type: normalize_text
    columns: [region, service, operator]
    operations: [strip, lower]

  # STEP 5 — Remove duplicate events
  # Before: overlapping 15-min log windows from distributed nodes caused
  # duplicate event IDs, inflating daily totals by 3-8%.
  - type: deduplicate
    subset: [event_id]

  # STEP 6 — Compute derived operational metrics
  # Before: analysts ran these formulas manually in Python scripts, often
  # with version mismatches between team members.
  #
  # sla_breach  → flags any service call taking longer than 2000 ms
  # throughput_class → classifies batch size for capacity planning
  - type: custom_python
    code: |
      for row in data:
          row['sla_breach']       = 1 if float(row['latency_ms']) > 2000 else 0
          row['throughput_class'] = (
              'high'   if int(row['volume']) > 20000 else
              'medium' if int(row['volume']) > 10000 else
              'low'
          )
          row['pipeline_date'] = row['timestamp'][:10]

  # STEP 7 — Isolate clean events only for the primary report
  # Before: team manually filtered error rows in Excel before sending to
  # stakeholders, occasionally forgetting and sending dirty data.
  - type: filter_rows
    condition: "int(is_error) == 0"

  # STEP 8 — Drop internal/operational columns not needed by stakeholders
  # Before: reports landed with raw internal fields causing confusion.
  - type: drop_columns
    columns: [notes, operator]

# ── 3. DESTINATION ────────────────────────────────────────────────────────────
# Loads into the analytical Data Lake (DuckDB).
# The `refined` schema holds production-ready tables consumed by dashboards
# and predictive models downstream.
#
# In production: swap `database` path for the shared DuckDB volume or
# replace this block entirely with a `postgres` destination pointing to
# the team's analytical warehouse.
destination:
  type: duckdb
  database: data_lake.duckdb
  table:    operational_events
  schema:   refined
  write_mode: replace

# =============================================================================
# IMPACT SUMMARY
# ─────────────────────────────────────────────────────────────────────────────
#  Manual process (before)   │  Automated pipeline (after)
#  ─────────────────────────────────────────────────────
#  ~4h / day                 │  ~20 min / day
#  8 manual steps            │  0 manual steps
#  Human error prone         │  Deterministic, tested, versioned
#  1 person blocked          │  Any team member can trigger or modify
#  No audit trail            │  Full metadata log (run_id, rows, timing)
#  88h / month wasted        │  ~6h / month (monitoring only)
#
#  Net reduction: 90% — from 88h to ~6h per month.
